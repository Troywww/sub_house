<!DOCTYPE html>
<html>
<head>
    <title>节点管理系统</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Base surfaces */
            --surface: #f7f8fa;
            --surface-elevated: #ffffff;
            --surface-hover: #f1f2f4;
            --border: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 0, 0, 0.14);
            --ink: #1a1a2e;
            --muted: #6b7280;

            /* Accent */
            --accent: #2563eb;
            --accent-soft: #eff6ff;
            --accent-border: rgba(37, 99, 235, 0.2);

            /* Semantic statuses */
            --positive: #059669;
            --positive-bg: #ecfdf5;
            --warning: #d97706;
            --warning-bg: #fffbeb;
            --danger: #dc2626;
            --danger-bg: #fef2f2;

            /* Radius */
            --radius: 8px;
            --radius-sm: 6px;
            --radius-lg: 12px;

            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
            --shadow-xl: 0 12px 40px rgba(0,0,0,0.1);

            /* Transitions */
            --ease: 180ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            background: var(--surface);
            color: var(--ink);
            font-family: 'Inter', system-ui, sans-serif;
        }

        .console-shell { max-width: 1760px; margin: 0 auto; }
        .console-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }
        .console-label-accent { color: var(--accent); }
        .console-mono { font-family: 'JetBrains Mono', monospace; }
        .console-ghost-divider { height: 1px; background: var(--border); }

        .console-card {
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            transition: box-shadow var(--ease), border-color var(--ease);
        }
        .console-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-lg);
        }
        .console-card-main {
            box-shadow: var(--shadow-lg);
        }
        .console-inset {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .console-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 44px;
            padding: 0 20px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface-elevated);
            color: var(--ink);
            font-weight: 700;
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
            transition: all var(--ease);
        }
        .console-button:hover { background: var(--surface-hover); border-color: var(--border-hover); }
        .console-button-dark {
            background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 1px 3px rgba(37, 99, 235, 0.3);
        }
        .console-button-dark:hover {
            background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
            border-color: transparent;
        }
        .console-button-compact {
            min-height: 34px;
            padding: 0 12px;
            gap: 6px;
            font-size: 12px;
        }
        .console-button-toolbar {
            border-color: var(--border);
            background: var(--surface-elevated);
            color: #374151;
            font-weight: 600;
            box-shadow: none;
        }
        .console-button-toolbar:hover { background: var(--surface-hover); }
        .console-toolbar-label {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            padding: 0 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #9ca3af;
            white-space: nowrap;
        }
        .console-icon-button {
            width: 36px;
            min-width: 36px;
            min-height: 36px;
            padding: 0;
            gap: 0;
            border-color: var(--border);
            background: var(--surface-elevated);
            color: #4b5563;
            box-shadow: none;
        }
        .console-icon-button:hover {
            background: var(--surface-hover);
            color: var(--ink);
        }

        .console-topnav {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
            padding: 8px 10px 0;
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: var(--radius) var(--radius) 0 0;
        }
        .console-tab {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 34px;
            padding: 0 12px;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            border: 1px solid transparent;
            border-bottom: none;
            background: transparent;
            color: #4b5563;
            font-size: 15px;
            font-weight: 700;
            transition: all var(--ease);
        }
        .console-tab:hover { background: var(--surface-hover); color: var(--ink); }
        .console-tab.active {
            background: var(--surface-elevated);
            border-color: var(--border);
            color: var(--ink);
            position: relative;
            box-shadow: var(--shadow-sm);
        }
        .console-tab.active::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: -1px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px 2px 0 0;
        }

        .console-input {
            width: 100%;
            min-height: 48px;
            border-radius: var(--radius);
            border: 1px solid var(--border-hover);
            background: var(--surface-elevated);
            padding: 0 14px;
            color: var(--ink);
            outline: none;
            transition: border-color var(--ease), box-shadow var(--ease);
        }
        .console-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-border);
        }
        .console-input::placeholder { color: #9ca3af; }

        .console-subscription-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 38px;
            padding: 0 14px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.02em;
            white-space: nowrap;
            transition: all var(--ease);
            border: 1px solid transparent;
        }
        .console-subscription-btn.primary { min-width: 116px; }
        .console-subscription-btn.base { color: #1e40af; background: #dbeafe; border-color: rgba(37, 99, 235, 0.15); }
        .console-subscription-btn.singbox { color: #065f46; background: #d1fae5; border-color: rgba(5, 150, 105, 0.15); }
        .console-subscription-btn.clash { color: #1e40af; background: #dbeafe; border-color: rgba(37, 99, 235, 0.15); }
        .console-subscription-btn.share { color: #6b7280; background: #f3f4f6; border-color: rgba(0, 0, 0, 0.06); }
        .console-subscription-btn:hover { filter: brightness(0.97); transform: translateY(-2px); box-shadow: var(--shadow-md); }

        .console-node-pick {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 56px;
            padding: 10px 12px;
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
            transition: border-color var(--ease), background var(--ease), box-shadow var(--ease);
        }
        .console-node-pick:hover {
            border-color: var(--accent-border);
            background: var(--accent-soft);
            box-shadow: 0 0 0 1px var(--accent-border);
        }
        .console-node-pick input[type="checkbox"] { width: 16px; height: 16px; margin: 0; accent-color: var(--accent); }
        .console-node-pick-title { font-size: 14px; font-weight: 600; color: #1f2937; line-height: 1.2; }

        .console-toast {
            background: rgba(17, 17, 17, 0.92);
            color: #fff;
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 13px;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.2s ease;
        }
        @keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        .modal-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.45);
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
            animation: fadeIn 0.15s ease;
            backdrop-filter: blur(4px);
        }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .modal-box {
            background: var(--surface-elevated);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            padding: 24px; max-width: 400px; width: 100%;
        }

        .console-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .console-header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="console-header sticky top-0 z-40">
    <div class="console-shell px-6 py-2.5 md:px-8 xl:px-10">
        <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-gray-900 text-white">
                    <i class="fas fa-cube text-base"></i>
                </div>
                <h1 class="text-lg font-extrabold tracking-tight text-gray-900">Sub House</h1>
            </div>
            <div class="flex items-center gap-2">
                <button class="console-button console-button-compact console-button-toolbar"><i class="fas fa-user"></i><span class="hidden sm:inline">用户入口</span></button>
                <button class="console-button console-button-compact console-button-toolbar"><i class="fas fa-sign-out-alt"></i><span class="hidden sm:inline">退出</span></button>
                <button class="console-button console-button-compact console-button-dark"><i class="fas fa-link"></i><span class="hidden sm:inline">其他链接</span></button>
            </div>
        </div>
    </div>
</header>

<!-- ===== MAIN ===== -->
<main class="console-shell px-8 py-6 md:px-10 xl:px-12">

    <!-- Tabs -->
    <nav class="console-topnav">
        <button class="console-tab active"><i class="fas fa-database"></i><span>集合管理</span></button>
        <button class="console-tab"><i class="fas fa-network-wired"></i><span>节点管理</span></button>
        <button class="console-tab"><i class="fas fa-file-alt"></i><span>模板管理</span></button>
        <button class="console-tab"><i class="fas fa-code-branch"></i><span>规则目录</span></button>
        <button class="console-tab"><i class="fas fa-sliders-h"></i><span>配置面板</span></button>
    </nav>

    <!-- Main Panel (now with more visible shadow) -->
    <section class="console-card console-card-main rounded-t-none p-5">
        <div class="space-y-1 mb-4">
            <div class="console-label">Collection Console</div>
            <p class="text-sm text-gray-500">创建集合并绑定节点，同时管理已有集合的订阅与编辑操作。</p>
        </div>

        <div class="space-y-4">

            <!-- Create -->
            <div class="console-inset p-4 space-y-3">
                <div class="flex flex-col gap-3 xl:flex-row xl:items-start xl:justify-between">
                    <div class="flex flex-col gap-2 md:flex-row md:items-center md:gap-3">
                        <div class="w-full md:w-72 xl:w-80">
                            <input type="text" class="console-input" placeholder="集合名称，例如：HK / 日常 / 视频">
                        </div>
                        <button class="console-button console-button-dark whitespace-nowrap"><i class="fas fa-plus"></i> 创建集合</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
                    <div class="md:col-span-2 xl:col-span-3 flex items-center gap-4 text-left">
                        <span class="text-lg font-bold tracking-tight text-gray-900">选择节点</span>
                        <button class="text-sm font-semibold text-gray-500 hover:text-gray-900" style="background:none;border:none;cursor:pointer;">全选</button>
                        <button class="text-sm font-semibold text-gray-500 hover:text-gray-900" style="background:none;border:none;cursor:pointer;">取消全选</button>
                    </div>
                    <label class="console-node-pick"><input type="checkbox" checked><span class="console-node-pick-title truncate">HK-01</span></label>
                    <label class="console-node-pick"><input type="checkbox"><span class="console-node-pick-title truncate">JP-Tokyo</span></label>
                    <label class="console-node-pick"><input type="checkbox"><span class="console-node-pick-title truncate">US-LA</span></label>
                    <label class="console-node-pick"><input type="checkbox"><span class="console-node-pick-title truncate">SG-Singapore</span></label>
                    <label class="console-node-pick"><input type="checkbox"><span class="console-node-pick-title truncate">TW-Taipei</span></label>
                    <label class="console-node-pick"><input type="checkbox"><span class="console-node-pick-title truncate">KR-Seoul</span></label>
                </div>
            </div>

            <!-- Search -->
            <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
                <div>
                    <div class="text-sm font-semibold text-gray-800">已创建的集合</div>
                    <p class="text-sm text-gray-500">按名称即时筛选当前集合列表。</p>
                </div>
                <div class="w-full md:w-72 xl:w-80">
                    <input type="text" class="console-input" style="min-height:38px;" placeholder="搜索集合名称">
                </div>
            </div>

            <!-- Collection Cards -->
            <div class="grid grid-cols-1 gap-4 xl:grid-cols-2">

                <div class="console-card p-5" style="border-left:3px solid #93c5fd;">
                    <div class="flex flex-col gap-4">
                        <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
                            <div class="min-w-0 flex-1">
                                <div class="flex flex-wrap items-center gap-3">
                                    <h3 class="text-xl font-extrabold tracking-tight text-gray-900 flex items-center">
                                        <i class="fas fa-layer-group mr-3 text-gray-700"></i>HK-日常
                                    </h3>
                                    <span class="text-sm text-gray-500">(到期：2026/6/24)</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <button class="console-button console-icon-button" title="编辑"><i class="fas fa-edit"></i></button>
                                <button class="console-button console-icon-button" title="删除"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <span class="inline-flex items-center px-2.5 py-1 bg-blue-50 text-blue-700 text-xs rounded-md"><span class="w-1.5 h-1.5 bg-blue-500 rounded-full mr-1.5"></span>HK-01</span>
                            <span class="inline-flex items-center px-2.5 py-1 bg-blue-50 text-blue-700 text-xs rounded-md"><span class="w-1.5 h-1.5 bg-blue-500 rounded-full mr-1.5"></span>HK-02</span>
                            <span class="inline-flex items-center px-2.5 py-1 bg-blue-50 text-blue-700 text-xs rounded-md"><span class="w-1.5 h-1.5 bg-blue-500 rounded-full mr-1.5"></span>HK-03</span>
                        </div>
                        <div class="console-ghost-divider"></div>
                        <div class="flex flex-wrap gap-2">
                            <button class="console-subscription-btn share"><i class="fas fa-share-alt"></i>分享</button>
                            <button class="console-subscription-btn primary base"><i class="fas fa-link"></i>通用订阅</button>
                            <button class="console-subscription-btn primary singbox"><i class="fas fa-box"></i>SingBox订阅</button>
                            <button class="console-subscription-btn primary clash"><i class="fas fa-bolt"></i>Clash订阅</button>
                        </div>
                    </div>
                </div>

                <div class="console-card p-5" style="border-left:3px solid #fcd34d;">
                    <div class="flex flex-col gap-4">
                        <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
                            <div class="min-w-0 flex-1">
                                <div class="flex flex-wrap items-center gap-3">
                                    <h3 class="text-xl font-extrabold tracking-tight text-gray-900 flex items-center">
                                        <i class="fas fa-layer-group mr-3 text-gray-700"></i>JP-流媒体
                                    </h3>
                                    <span class="text-sm text-gray-500">(到期：2026/6/20)</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <button class="console-button console-icon-button" title="编辑"><i class="fas fa-edit"></i></button>
                                <button class="console-button console-icon-button" title="删除"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <span class="inline-flex items-center px-2.5 py-1 bg-yellow-50 text-yellow-700 text-xs rounded-md"><span class="w-1.5 h-1.5 bg-yellow-500 rounded-full mr-1.5"></span>JP-Tokyo</span>
                        </div>
                        <div class="console-ghost-divider"></div>
                        <div class="flex flex-wrap gap-2">
                            <button class="console-subscription-btn share"><i class="fas fa-share-alt"></i>分享</button>
                            <button class="console-subscription-btn primary base"><i class="fas fa-link"></i>通用订阅</button>
                            <button class="console-subscription-btn primary singbox"><i class="fas fa-box"></i>SingBox订阅</button>
                            <button class="console-subscription-btn primary clash"><i class="fas fa-bolt"></i>Clash订阅</button>
                        </div>
                    </div>
                </div>

                <div class="console-card p-5" style="border-left:3px solid #fca5a5;">
                    <div class="flex flex-col gap-4">
                        <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
                            <div class="min-w-0 flex-1">
                                <div class="flex flex-wrap items-center gap-3">
                                    <h3 class="text-xl font-extrabold tracking-tight text-gray-900 flex items-center">
                                        <i class="fas fa-layer-group mr-3 text-gray-700"></i>US-旧节点
                                    </h3>
                                    <span class="text-sm text-gray-500">(到期：2026/5/1)</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <button class="console-button console-icon-button" title="编辑"><i class="fas fa-edit"></i></button>
                                <button class="console-button console-icon-button" title="删除"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <span class="inline-flex items-center px-2.5 py-1 bg-red-50 text-red-700 text-xs rounded-md"><span class="w-1.5 h-1.5 bg-red-500 rounded-full mr-1.5"></span>US-LA</span>
                        </div>
                        <div class="console-ghost-divider"></div>
                        <div class="flex flex-wrap gap-2">
                            <button class="console-subscription-btn share"><i class="fas fa-share-alt"></i>分享</button>
                            <button class="console-subscription-btn primary base"><i class="fas fa-link"></i>通用订阅</button>
                            <button class="console-subscription-btn primary singbox"><i class="fas fa-box"></i>SingBox订阅</button>
                            <button class="console-subscription-btn primary clash"><i class="fas fa-bolt"></i>Clash订阅</button>
                        </div>
                    </div>
                </div>

                <div class="console-card p-5" style="border-left:3px solid #cbd5e1;">
                    <div class="flex flex-col gap-4">
                        <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
                            <div class="min-w-0 flex-1">
                                <div class="flex flex-wrap items-center gap-3">
                                    <h3 class="text-xl font-extrabold tracking-tight text-gray-900 flex items-center">
                                        <i class="fas fa-layer-group mr-3 text-gray-700"></i>内部测试
                                    </h3>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <button class="console-button console-icon-button" title="编辑"><i class="fas fa-edit"></i></button>
                                <button class="console-button console-icon-button" title="删除"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <span class="inline-flex items-center px-2.5 py-1 bg-gray-50 text-gray-700 text-xs rounded-md"><span class="w-1.5 h-1.5 bg-gray-500 rounded-full mr-1.5"></span>CN-Direct</span>
                        </div>
                        <div class="console-ghost-divider"></div>
                        <div class="flex flex-wrap gap-2">
                            <button class="console-subscription-btn share"><i class="fas fa-share-alt"></i>分享</button>
                            <button class="console-subscription-btn primary base"><i class="fas fa-link"></i>通用订阅</button>
                            <button class="console-subscription-btn primary singbox"><i class="fas fa-box"></i>SingBox订阅</button>
                            <button class="console-subscription-btn primary clash"><i class="fas fa-bolt"></i>Clash订阅</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Demo -->
    <div class="flex items-center gap-3 mt-8 p-5" style="border-top:1px solid rgba(198,198,198,0.4);">
        <span class="console-label">Demo</span>
        <button onclick="showConfirmDemo()" class="console-button console-button-compact console-button-toolbar"><i class="fas fa-check-circle"></i>确认弹窗</button>
        <button onclick="showAlertDemo()" class="console-button console-button-compact console-button-toolbar"><i class="fas fa-info-circle"></i>提示弹窗</button>
        <button onclick="showToastDemo()" class="console-button console-button-compact console-button-toolbar"><i class="fas fa-bell"></i>Toast 通知</button>
    </div>
</main>

<script>
    function showConfirmDemo() {
        const ov = document.createElement('div'); ov.className = 'modal-overlay';
        ov.innerHTML = '<div class="modal-box"><div class="console-label mb-3">Confirm</div><p class="text-sm text-gray-700 leading-6">确定要执行此操作吗？</p><div class="flex justify-end gap-2 mt-6"><button class="console-button console-button-compact console-button-toolbar" onclick="this.closest(\'.modal-overlay\').remove()">取消</button><button class="console-button console-button-compact console-button-dark" onclick="this.closest(\'.modal-overlay\').remove();showToast(\'已确认\')">确定</button></div></div>';
        ov.onclick = e => { if (e.target === ov) ov.remove(); };
        document.body.appendChild(ov);
    }
    function showAlertDemo() {
        const ov = document.createElement('div'); ov.className = 'modal-overlay';
        ov.innerHTML = '<div class="modal-box"><div class="console-label mb-3">Notice</div><p class="text-sm text-gray-700 leading-6">自定义模态对话框，替代原生 alert。</p><div class="flex justify-end mt-6"><button class="console-button console-button-compact console-button-dark" onclick="this.closest(\'.modal-overlay\').remove()">确定</button></div></div>';
        ov.onclick = e => { if (e.target === ov) ov.remove(); };
        document.body.appendChild(ov);
    }
    function showToast(m) {
        const t = document.createElement('div'); t.className = 'console-toast fixed bottom-4 left-1/2 transform -translate-x-1/2';
        t.textContent = m || '操作成功';
        document.body.appendChild(t); setTimeout(() => t.remove(), 2200);
    }
    function showToastDemo() { showToast('配置已保存'); }
</script>

</body>
</html>
